apiVersion: apps/v1
kind: Deployment
metadata: { name: graphqlmap, labels: { app: graphqlmap } }
spec:
  replicas: 1
  selector: { matchLabels: { app: graphqlmap } }
  template:
    metadata: { labels: { app: graphqlmap } }
    spec:
      containers:
        - name: graphqlmap
          image: ghcr.io/cognis-digital/graphqlmap:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: graphqlmap }
spec:
  selector: { app: graphqlmap }
  ports: [{ port: 80, targetPort: 8000 }]
